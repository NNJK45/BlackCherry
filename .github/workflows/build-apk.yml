name: Build APK Black Cherry

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BlackCherry-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: BlackCherry-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Sign Release APK (si keystore disponible)
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > blackcherry.keystore
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore blackcherry.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "${{ secrets.KEY_ALIAS }}"
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/zipalign -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            BlackCherry-v2.0.apk

      - name: Upload Signed APK
        if: secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: BlackCherry-Signed-APK
          path: BlackCherry-v2.0.apk
